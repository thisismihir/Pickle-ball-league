<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pick-a-League</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<nav class="navbar">
    <div class="container">
        <div class="nav-content">
            <a href="index.html" class="nav-brand">🏓 Pick-a-League</a>

            <div class="nav-links">
                <a href="standings.html" class="nav-link">Standings</a>
                <a href="fixtures.html" class="nav-link">Fixtures</a>
            </div>

            <div class="nav-actions">
                <span class="user-info" id="userInfo"></span>
                <button class="btn btn-secondary" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>
</nav>

<div class="page-container">
    <div class="page-header">
        <h1 class="page-title">Team Manager Dashboard</h1>
    </div>

    <div id="content"></div>
</div>

<script src="js/auth.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>

<script>

const user = requireAuth();

// Redirect admin to admin dashboard
if (user && user.role === 'admin') {
    window.location.href = 'admin.html';
}

if (user) {
    document.getElementById('userInfo').textContent = user.username;
    loadDashboard();
}

async function loadDashboard() {
    const content = document.getElementById('content');
    content.innerHTML = <div class="loading">Loading...</div>;

    try {
        // Regular users can't always access include_pending=true
        let teams = [];

        try {
            teams = await api.getTeams(true);
        } catch (error) {
            // If forbidden (403), retry without pending filter
            try {
                teams = await api.getTeams(false);
            } catch (e) {
                console.error('Failed to fetch teams:', e);
                teams = [];
            }
        }

        if (!Array.isArray(teams)) {
            teams = [];
        }

        const userTeam = teams.find(t => t.manager_id === user.id);

        // No team found
        if (!userTeam) {
            content.innerHTML = `
                <div class="alert alert-info">
                    <h2 style="margin-bottom:0.5rem;">No Team Found</h2>
                    <p style="margin-bottom:1rem;">
                        You haven't registered a team yet.
                        Create a team to start managing your league participation.
                    </p>
                    <a href="register-team.html"
                       class="btn btn-primary">Register Team</a>
                </div>
            `;
            return;
        }

        let html = `
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                <h2>${userTeam.name}</h2>
                <span class="badge ${
                    userTeam.status === 'approved' ? 'badge-success' :
                    userTeam.status === 'pending' ? 'badge-warning' :
                    'badge-danger'
                }">
                    ${userTeam.status}
                </span>
            </div>

            ${userTeam.description ?
                `<p style="color:#6b7280; margin-bottom:1rem;">
                    ${userTeam.description}
                 </p>` : ''
            }

            <h3 style="margin-bottom:0.5rem;">
                Players (${userTeam.players ? userTeam.players.length : 0})
            </h3>

            <div style="display:flex; flex-direction:column; gap:0.5rem;">
        `;

        // Players List
        if (userTeam.players) {
            userTeam.players.forEach(player => {
                html += `
                <div style="background:#f9fafb;
                            padding:0.75rem;
                            border-radius:0.5rem;
                            display:flex;
                            justify-content:space-between;">
                    <span>${player.first_name} ${player.last_name}</span>
                    <span style="color:#6b7280;">
                        ${player.email}
                    </span>
                </div>
                `;
            });
        }

        html += </div></div>;

        // If Approved → Show quick action cards
        if (userTeam.status === 'approved') {
            html += `
            <div style="display:grid;
                        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                        gap:1.5rem;
                        margin-top:2rem;">

                <a href="fixtures.html"
                   class="card"
                   style="text-decoration:none; color:inherit; cursor:pointer;">
                    <div style="font-size:3rem; margin-bottom:0.5rem;">📅</div>
                    <h3 style="margin-bottom:0.25rem;">View Fixtures</h3>
                    <p style="color:#6b7280; font-size:0.875rem;">
                        See your team's match schedule
                    </p>
                </a>

                <a href="standings.html"
                   class="card"
                   style="text-decoration:none; color:inherit; cursor:pointer;">
                    <div style="font-size:3rem; margin-bottom:0.5rem;">🏆</div>
                    <h3 style="margin-bottom:0.25rem;">Standings</h3>
                    <p style="color:#6b7280; font-size:0.875rem;">
                        Check league standings
                    </p>
                </a>
            </div>
            `;
        }
        else if (userTeam.status === 'pending') {
            html += `
            <div class="alert alert-info" style="margin-top:2rem;">
                <h3 style="margin-bottom:0.5rem;">Awaiting Approval</h3>
                <p>
                    Your team registration is pending admin approval.
                    You'll be notified once approved.
                </p>
            </div>
            `;
        }

        content.innerHTML = html;

    } catch (error) {
        console.error('Dashboard error:', error);

        content.innerHTML = `
            <div class="alert alert-info">
                <h2 style="margin-bottom:0.5rem;">No Team Found</h2>
                <p style="margin-bottom:1rem;">
                    You haven't registered a team yet.
                    Create a team to start managing your league participation.
                </p>
                <a href="register-team.html"
                   class="btn btn-primary">Register Team</a>
            </div>
        `;
    }
}

</script>

</body>
</html>
