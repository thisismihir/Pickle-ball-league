<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Pick-a-League</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/config.js"></script>
</head>

<body>

<nav class="navbar">
    <div class="container">
        <div class="nav-content">
            <a href="index.html" class="nav-brand">
                <img src="images/logo.png" alt="Pick-a-League Logo">
            </a>
        </div>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-card">
        <h1>Create your account</h1>
        <p class="auth-subtitle">
            Already have an account?
            <a href="login.html">Sign in</a>
        </p>

        <div id="errorMessage"
             class="alert alert-error"
             style="display:none;">
        </div>

        <form id="registerForm">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text"
                       id="username"
                       name="username"
                       required
                       minlength="3"
                       class="form-input">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email"
                       id="email"
                       name="email"
                       required
                       class="form-input">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password"
                       id="password"
                       name="password"
                       required
                       minlength="6"
                       class="form-input">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password"
                       id="confirmPassword"
                       name="confirmPassword"
                       required
                       class="form-input">
            </div>

            <button type="submit"
                    class="btn btn-primary btn-block"
                    id="submitBtn">
                Create account
            </button>

        </form>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const errorDiv = document.getElementById('errorMessage');
    const submitBtn = document.getElementById('submitBtn');

    errorDiv.style.display = 'none';

    if (password !== confirmPassword) {
        errorDiv.textContent = 'Passwords do not match';
        errorDiv.style.display = 'block';
        return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account...';

    try {
        console.log('Attempting registration for:', username);
        
        const response = await fetch(getApiUrl('/api/auth/register'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username,
                email,
                password,
                role: 'team_manager'
            })
        });

        console.log('Registration response status:', response.status);
        
        // Read response text first
        const responseText = await response.text();
        console.log('Raw response:', responseText);
        
        // Try to parse as JSON
        let data;
        try {
            data = JSON.parse(responseText);
        } catch (parseError) {
            console.error('Failed to parse JSON response:', parseError);
            throw new Error('Invalid server response. Backend may be down.');
        }

        if (!response.ok) {
            console.error('Registration failed:', data.detail || data);
            throw new Error(data.detail || `Registration failed (HTTP ${response.status})`);
        }

        console.log('Registration successful:', data);
        alert('Registration successful! Please login.');
        window.location.href = 'login.html';

    } catch (error) {
        console.error('Registration error:', error);
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create account';
    }
});
</script>

</body>
</html>
