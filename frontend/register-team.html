<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Team - Pick-a-League</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/config.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <div class="nav-content">
            <a href="index.html" class="nav-brand">🏓 Pick-a-League</a>
            <div class="nav-links">
                <a href="standings.html" class="nav-link">Standings</a>
            </div>
            <div class="nav-actions">
                <span class="user-info" id="userInfo" style="display:none;"></span>
                <button class="btn btn-secondary" id="logoutBtn" style="display:none;">Logout</button>
            </div>
        </div>
    </div>
</nav>

<div class="page-container">
    <div class="page-header">
        <h1 class="page-title">Register Your Team</h1>
        <p style="color:#6b7280; margin-top:0.5rem;">
            Register as a complete team with 2-6 players
        </p>
    </div>

    <div class="card">
        <form id="teamForm">

            <div class="form-group">
                <label class="form-label">Team Name</label>
                <input type="text" class="form-input" id="teamName" required>
            </div>

            <div class="form-group">
                <label class="form-label">Team Description (optional)</label>
                <textarea class="form-input" id="teamDescription" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Home Venue (optional)</label>
                <input type="text" class="form-input" id="homeVenue" placeholder="e.g., Central Sports Complex">
            </div>

            <hr style="margin:2rem 0; border:none; border-top:1px solid #e5e7eb;">

            <h3 style="margin-bottom:1rem;">Players (2-6)</h3>

            <div id="playersContainer">

                <!-- Player 1 -->
                <div class="player-entry" data-index="0">
                    <h4 style="margin-bottom:0.75rem;">Player 1</h4>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                        <div class="form-group">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-input player-first-name" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-input player-last-name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input player-email" required>
                    </div>
                </div>

                <!-- Player 2 -->
                <div class="player-entry" data-index="1">
                    <h4 style="margin-bottom:0.75rem;">Player 2</h4>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                        <div class="form-group">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-input player-first-name" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-input player-last-name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input player-email" required>
                    </div>
                </div>

            </div>

            <div style="display:flex; gap:1rem; margin-top:1rem;">
                <button type="button" class="btn btn-secondary" onclick="addPlayer()" id="addPlayerBtn">
                    Add Player
                </button>
                <button type="button" class="btn btn-secondary" onclick="removePlayer()" id="removePlayerBtn" disabled>
                    Remove Player
                </button>
            </div>

            <hr style="margin:2rem 0; border:none; border-top:1px solid #e5e7eb;">

            <div class="alert alert-info" style="margin-bottom:1rem;">
                Note: Your team will be submitted for admin approval before becoming active in the league.
            </div>

            <div id="message" class="alert alert-error" style="display:none;"></div>

            <button type="submit" class="btn btn-primary btn-lg">
                Register Team
            </button>

        </form>
    </div>
</div>

<style>
.player-entry {
    background:#f9fafb;
    padding:1.5rem;
    border-radius:0.5rem;
    margin-bottom:1rem;
}
</style>

<script src="js/auth.js?v=2"></script>
<script src="js/config.js"></script>
<script src="js/api.js?v=2"></script>

<script>

const user = requireAuth();

if (user) {
    document.getElementById('userInfo').textContent = user.username;
    document.getElementById('logoutBtn').style.display = 'inline-block';
    document.getElementById('logoutBtn').addEventListener('click', logout);
}

let playerCount = 2;
const maxPlayers = 6;

function addPlayer() {
    if (playerCount >= maxPlayers) {
        alert("Maximum 6 players allowed per team");
        return;
    }

    playerCount++;

    const container = document.getElementById('playersContainer');
    const playerEntry = document.createElement('div');
    playerEntry.className = 'player-entry';
    playerEntry.setAttribute('data-index', playerCount - 1);

    playerEntry.innerHTML = `
        <h4 style="margin-bottom:0.75rem;">Player ${playerCount}</h4>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
                <label class="form-label">First Name</label>
                <input type="text" class="form-input player-first-name" required>
            </div>
            <div class="form-group">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-input player-last-name" required>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input player-email" required>
        </div>
    `;

    container.appendChild(playerEntry);
    updateButtons();
}

function removePlayer() {
    if (playerCount <= 2) return;

    const container = document.getElementById('playersContainer');
    container.removeChild(container.lastElementChild);
    playerCount--;
    updateButtons();
}

function updateButtons() {
    document.getElementById('addPlayerBtn').disabled = playerCount >= maxPlayers;
    document.getElementById('removePlayerBtn').disabled = playerCount <= 2;
}

document.getElementById('teamForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const messageDiv = document.getElementById('message');
    messageDiv.style.display = 'none';

    const teamName = document.getElementById('teamName').value;
    const teamDescription = document.getElementById('teamDescription').value;
    const homeVenue = document.getElementById('homeVenue').value;

    const players = [];
    const playerEntries = document.querySelectorAll('.player-entry');

    playerEntries.forEach(entry => {
        const firstName = entry.querySelector('.player-first-name').value;
        const lastName = entry.querySelector('.player-last-name').value;
        const email = entry.querySelector('.player-email').value;

        players.push({
            first_name: firstName,
            last_name: lastName,
            email: email
        });
    });

    try {
        const response = await fetch(getApiUrl('/api/teams'), {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}`
            },
            body: JSON.stringify({
                name: teamName,
                description: teamDescription,
                home_venue: homeVenue,
                players: players
            })
        });

        const data = await response.json();

        if (!response.ok) {
            if (data.detail && Array.isArray(data.detail)) {
                const errors = data.detail
                    .map(err => `${err.loc.join('.')}: ${err.msg}`)
                    .join('\n');
                throw new Error(errors);
            } else if (typeof data.detail === "string") {
                throw new Error(data.detail);
            } else {
                throw new Error("Failed to register team. Please check all fields.");
            }
        }

        alert("Team registered successfully! Awaiting admin approval.");
        window.location.href = "dashboard.html";

    } catch (error) {
        console.error("Registration error:", error);
        messageDiv.textContent = error.message || "Failed to register team";
        messageDiv.style.display = 'block';
    }
});

</script>

</body>
</html>
