<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standings - Pick-a-League</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/config.js"></script>
</head>

<body>

<nav class="navbar">
    <div class="container">
        <div class="nav-content">
            <a href="index.html" class="nav-brand">🏓 Pick-a-League</a>

            <div class="nav-links" id="navLinks">
                <a href="standings.html" class="nav-link">Standings</a>
                <a href="fixtures.html"
                   class="nav-link"
                   id="fixturesLink"
                   style="display:none;">
                    Fixtures
                </a>
                <a href="admin.html"
                   class="nav-link"
                   id="adminLink"
                   style="display:none;">
                    Admin
                </a>
            </div>

            <div class="nav-actions" id="navActions">
                <a href="login.html"
                   class="btn btn-secondary"
                   id="loginBtn">
                    Login
                </a>

                <a href="register.html"
                   class="btn btn-primary"
                   id="registerBtn">
                    Register
                </a>

                <span class="user-info"
                      id="userInfo"
                      style="display:none;">
                </span>

                <button class="btn btn-secondary"
                        id="logoutBtn"
                        style="display:none;">
                    Logout
                </button>
            </div>
        </div>
    </div>
</nav>

<div class="page-container">
    <div class="page-header">
        <h1 class="page-title">League Standings</h1>
    </div>

    <div id="content"></div>
</div>

<script src="js/auth.js"></script>

<script>
async function loadStandings() {
    const content = document.getElementById('content');
    content.innerHTML = '<div class="loading">Loading standings...</div>';

    try {
        const response = await fetch(getApiUrl('/api/standings'));
        const standings = await response.json();

        if (!standings.length) {
            content.innerHTML = `
                <div class="empty-state">
                    No standings available yet.
                    Matches need to be played and confirmed.
                </div>
            `;
            return;
        }

        let html = `
            <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Team</th>
                        <th style="text-align:center;">P</th>
                        <th style="text-align:center;">W</th>
                        <th style="text-align:center;">L</th>
                        <th style="text-align:center;">Pts</th>
                        <th style="text-align:center;">For</th>
                        <th style="text-align:center;">Against</th>
                        <th style="text-align:center;">Diff</th>
                    </tr>
                </thead>
                <tbody>
        `;

        standings.forEach(standing => {

            const diffColor =
                standing.score_difference > 0 ? 'color:#10b981;' :
                standing.score_difference < 0 ? 'color:#ef4444;' :
                '';

            html += `
                <tr>
                    <td style="font-weight:700; font-size:1.125rem;">
                        ${standing.position}
                    </td>
                    <td style="font-weight:600;">
                        ${standing.team_name}
                    </td>
                    <td style="text-align:center;">
                        ${standing.matches_played}
                    </td>
                    <td style="text-align:center; color:#10b981; font-weight:600;">
                        ${standing.wins}
                    </td>
                    <td style="text-align:center; color:#ef4444; font-weight:600;">
                        ${standing.losses}
                    </td>
                    <td style="text-align:center; font-weight:700;">
                        ${standing.points}
                    </td>
                    <td style="text-align:center;">
                        ${standing.score_for}
                    </td>
                    <td style="text-align:center;">
                        ${standing.score_against}
                    </td>
                    <td style="text-align:center; font-weight:600; ${diffColor}">
                        ${standing.score_difference > 0 ? '+' : ''}
                        ${standing.score_difference}
                    </td>
                </tr>
            `;
        });

        html += `
                </tbody>
            </table>
            </div>
        `;

        content.innerHTML = html;

    } catch (error) {
        content.innerHTML = `
            <div class="alert alert-error">
                Failed to load standings
            </div>
        `;
    }
}

loadStandings();
</script>

</body>
</html>
